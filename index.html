<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>OneWorldFeed</title>

  <!-- GLOBAL BASE STYLES -->
  <link rel="stylesheet" href="/assets/css/global/global.css">
  <link rel="stylesheet" href="/assets/css/global/layout.css">
  <link rel="stylesheet" href="/assets/css/global/left-panel.css">
  <link rel="stylesheet" href="/assets/css/global/nav.css">
  <link rel="stylesheet" href="/assets/css/global/feed.css">
  <link rel="stylesheet" href="/assets/css/global/right-panel.css">
  <link rel="stylesheet" href="/assets/css/global/style.css">
  <link rel="stylesheet" href="/assets/css/global/high-contrast.css">
  <link rel="stylesheet" href="/assets/css/global/reduced-motion.css">
  <link rel="stylesheet" href="/assets/css/global/screenreader.css">

  <!-- MOTION SYSTEM -->
  <link rel="stylesheet" href="/assets/css/motion/hover.css">
  <link rel="stylesheet" href="/assets/css/motion/lift.css">
  <link rel="stylesheet" href="/assets/css/motion/page-entrance.css">
  <link rel="stylesheet" href="/assets/css/motion/pulse.css">
  <link rel="stylesheet" href="/assets/css/motion/shimmer.css">
  <link rel="stylesheet" href="/assets/css/motion/transitions.css">

  <!-- THEMES -->
  <link rel="stylesheet" href="/assets/css/themes/light.css">
  <link rel="stylesheet" href="/assets/css/themes/dark.css">
  <link rel="stylesheet" href="/assets/css/themes/autumn.css">
  <link rel="stylesheet" href="/assets/css/themes/spring.css">
  <link rel="stylesheet" href="/assets/css/themes/summer.css">
  <link rel="stylesheet" href="/assets/css/themes/winter.css">

  <!-- COMPONENTS -->
  <link rel="stylesheet" href="/components/buttons/button.css">
  <link rel="stylesheet" href="/components/header/header.css">
  <link rel="stylesheet" href="/components/forms/form.css">
  <link rel="stylesheet" href="/components/footer/footer.css">
  <link rel="stylesheet" href="/components/modals/modal.css">
  <link rel="stylesheet" href="/components/radio/radio-player.css">

  <!-- FEED CARD SYSTEM -->
  <link rel="stylesheet" href="/components/feed-card/tokens/colors.css">
  <link rel="stylesheet" href="/components/feed-card/tokens/shadows.css">
  <link rel="stylesheet" href="/components/feed-card/tokens/spacing.css">
  <link rel="stylesheet" href="/components/feed-card/tokens/typography.css">

  <link rel="stylesheet" href="/components/feed-card/animations/entry.css">
  <link rel="stylesheet" href="/components/feed-card/animations/hover.css">
  <link rel="stylesheet" href="/components/feed-card/animations/lift.css">
  <link rel="stylesheet" href="/components/feed-card/animations/pulse.css">
  <link rel="stylesheet" href="/components/feed-card/animations/shimmer.css">

  <link rel="stylesheet" href="/components/feed-card/themes/regions/africa.css">
  <link rel="stylesheet" href="/components/feed-card/themes/regions/americas.css">
  <link rel="stylesheet" href="/components/feed-card/themes/regions/asia.css">
  <link rel="stylesheet" href="/components/feed-card/themes/regions/europe.css">
  <link rel="stylesheet" href="/components/feed-card/themes/regions/oceania.css">

  <link rel="stylesheet" href="/components/feed-card/themes/tags/breaking.css">
  <link rel="stylesheet" href="/components/feed-card/themes/tags/celebratory.css">
  <link rel="stylesheet" href="/components/feed-card/themes/tags/new.css">
  <link rel="stylesheet" href="/components/feed-card/themes/tags/urgent.css">

  <link rel="stylesheet" href="/components/feed-card/feed-cards.css">
</head>

<body>

  <!-- GLOBAL APP SHELL -->
  <div id="owf-app">

    <!-- LEFT PANEL -->
    <aside class="owf-left-panel">

      <!-- Header -->
      <div class="left-header">
        <img src="/assets/img/logo/owf-logo.png" alt="OWF Logo" class="owf-logo">
        <h1 class="brand-title">OneWorldFeed</h1>
      </div>

      <!-- User Profile -->
      <div class="left-profile">
        <div class="left-profile-avatar">JS</div>
        <div class="left-profile-info">
          <div class="left-profile-name">James Smith</div>
          <div class="left-profile-role">Social</div>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="left-nav">
        <a href="#/home" class="nav-item">Home</a>
        <a href="#/profile" class="nav-item">Profile</a>
        <a href="#/social" class="nav-item">Social</a>
        <a href="#/music" class="nav-item">Music</a>
        <a href="#/podcasts" class="nav-item">Podcasts</a>
        <a href="#/live" class="nav-item">Live</a>
        <a href="#/discover" class="nav-item">Discover</a>
        <a href="#/news" class="nav-item">News</a>
        <a href="#/ai" class="nav-item">AI</a>
        <a href="#/saved" class="nav-item">Saved</a>
        <a href="#/dm" class="nav-item">DM</a>
        <a href="#/badges" class="nav-item">Badges</a>
        <a href="#/settings" class="nav-item">Settings</a>
      </nav>

      <!-- Radio Player Card -->
      <div class="left-radio-card">
        <div class="left-radio-player"></div>
      </div>

      <!-- Glow Selector -->
      <div id="left-glow-selector"></div>

      <!-- Global Signals -->
      <div class="left-global-signals"></div>

      <!-- Footer -->
      <div class="left-footer">
        <a href="#">About</a>
        <a href="#">Legal</a>
        <span class="left-footer-version">v4.4.4</span>
      </div>

    </aside>

    <!-- CENTER COLUMN -->
    <main class="owf-center">

      <header class="owf-global-header">
        <div class="post-bar">
          <input type="text" placeholder="Share something with the world..." class="post-input">
        </div>

        <div class="search-bar">
          <input type="text" placeholder="Search OneWorldFeed..." class="search-input">
        </div>
      </header>

      <section id="owf-page"></section>

    </main>

    <!-- RIGHT PANEL -->
    <aside class="owf-right-panel">
      <div id="right-global"></div>
    </aside>

  </div>

  <!-- SCRIPTS (absolute paths fix module loading) -->
  <script type="module" src="/modules/nav/nav.js" defer></script>
  <script type="module" src="/components/left-panel/left-panel.js" defer></script>
  <script type="module" src="/modules/right-panel/right-panel.js" defer></script>
  <script type="module" src="/app.js" defer></script>

</body>
</html>
